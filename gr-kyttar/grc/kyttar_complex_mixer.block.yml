id: kyttar_complex_mixer
label: Complex Mixer
category: '[Kyttar]'
flags: [ python ]

documentation: |-
  Kyttar Complex Mixer — frequency shifter, a drop-in for GNU Radio's
  blocks.multiply_cc(signal, analog.sig_source_c(...)).

  Multiplies a complex input signal by a complex exponential:
      out[n] = in[n] * exp(j*2*pi*frequency/sample_rate*n)
      yi = xi*cos - xq*sin,  yq = xi*sin + xq*cos   (the full complex product)

  The exponential is generated by the same interpolated quarter-wave NCO as the
  Kyttar Signal Source (~11 LSB; ~1 LSB on grid-aligned frequencies). The 16-bit
  phase word resolves frequency to sample_rate/65536 Hz.

  This block runs on the Kyttar chip. Place it between a KyttarSource and KyttarSink
  block, and ensure the device_id matches your KyttarDevice.

  Parameters (mirroring GNU Radio's Signal Source — the mixing oscillator):
  - Device ID: ID of the KyttarDevice block
  - Sample Rate: sample rate in Hz
  - Frequency: mixing/shift frequency in Hz (NOT an internal freq_word)

templates:
  imports: from gnuradio import kyttar
  make: kyttar.complex_mixer(device_id=${device_id}, sample_rate=${sample_rate},
    frequency=${frequency})
  callbacks:
    - set_frequency(${frequency})

parameters:
  - id: device_id
    label: Device ID
    dtype: string
    default: '"kyttar_0"'
  - id: sample_rate
    label: Sample Rate
    dtype: real
    default: samp_rate
  - id: frequency
    label: Frequency
    dtype: real
    default: '2000'

inputs:
  - label: in
    dtype: complex

outputs:
  - label: out
    dtype: complex

file_format: 1
