id: kyttar_complex_rrc_matched_filter
label: 🧪 Kyttar Complex RRC Matched Filter
category: '[Kyttar]'

templates:
  imports: from gnuradio import kyttar
  make: kyttar.complex_rrc_matched_filter(${device_id}, ${alpha}, ${span})

parameters:
- id: device_id
  label: Device ID
  dtype: string
  default: '"kyttar_0"'

- id: alpha
  label: Roll-off (alpha)
  dtype: real
  default: '0.35'

- id: span
  label: Filter Span (symbols)
  dtype: int
  default: '8'

inputs:
- label: xi
  domain: stream
  dtype: complex

outputs:
- label: yi
  domain: stream
  dtype: complex

documentation: |-
  🧪 PROOF-OF-CONCEPT: this block works in a demo but has NOT been through
  per-block GNU Radio-equivalence verification. Use with care.

  Complex RRC Matched Filter — receive matched filter front end.

  Takes the COMPLEX baseband (xi = in-phase, xq = quadrature) and applies a
  sqrt-Raised-Cosine matched filter on BOTH rails, emitting the matched-filtered
  complex sample (yi = filtered I, yq = filtered Q). Together with the transmit
  sqrt-RRC pulse shaper this forms a raised-cosine Nyquist response (zero ISI) and
  is the optimal-SNR linear filter for the known pulse in AWGN.

  The port names (xi, xq inputs; yi, yq outputs) and params (alpha, span) match the
  placeKYT ComplexRRCMatchedFilterBlock interface, so a flowgraph using this block
  wires up and imports into placeKYT cleanly (File -> Import GNURadio Flowgraph).

  Parameters:
    Device ID: which Kyttar device to use
    alpha:     RRC roll-off / excess bandwidth (0.2-0.5 typical; 0.35 default)
    span:      filter span in symbols (default 8)

  Mapped by placeKYT to ComplexRRCMatchedFilterBlock.

file_format: 1
