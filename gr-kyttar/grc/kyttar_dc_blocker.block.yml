id: kyttar_dc_blocker
label: DC Blocker
category: '[Kyttar]'
flags: [ python ]

documentation: |-
  DC Blocker — drop-in for GNU Radio's filter.dc_blocker_ff.

  A computationally-efficient high-pass that produces a tight notch around DC
  with a smaller group delay than an equivalent FIR or single-pole IIR. It is an
  LTI filter (a symmetric FIR): a delayed copy of the input minus a cascade of
  length-D moving averagers.

  This block runs on the Kyttar chip. Place it between a KyttarSource and
  KyttarSink block, and ensure the device_id matches your KyttarDevice.

  Parameters (mirroring GNU Radio's dc_blocker_xx verbatim):
  - Device ID: ID of the KyttarDevice block
  - Length (D): the moving-averager delay-line length (default 32). Longer
    lines give a narrower DC notch.
  - Long Form: long form (True, default) has a flatter passband at a group
    delay of 2D-2; short form has group delay D-1 and is cheaper.

templates:
  imports: from gnuradio import kyttar
  make: kyttar.dc_blocker(device_id=${device_id}, length=${length}, long_form=${long_form})
  callbacks:
    - set_length(${length})

parameters:
  - id: device_id
    label: Device ID
    dtype: string
    default: '"kyttar_0"'
  - id: length
    label: Length (D)
    dtype: int
    default: 32
  - id: long_form
    label: Long Form
    dtype: bool
    default: 'True'

inputs:
  - label: in
    dtype: float

outputs:
  - label: out
    dtype: float

file_format: 1
