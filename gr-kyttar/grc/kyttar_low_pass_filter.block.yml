id: kyttar_low_pass_filter
label: Low Pass Filter
category: '[Kyttar]'
flags: [ python ]

documentation: |-
  Kyttar Low Pass Filter — drop-in for GNU Radio's Low Pass Filter
  (filter.fir_filter_fff fed taps from filter.firdes.low_pass).

  A convenience FIR specified in DSP units: the chip block designs the firdes
  windowed-sinc taps internally (bit-exact firdes after Q15 quantization) and
  runs them on the verified Kyttar FIR datapath.

  This block runs on the Kyttar chip. Place it between a KyttarSource and
  KyttarSink block, and ensure the device_id matches your KyttarDevice.

  Parameters (mirroring GNU Radio's Low Pass Filter verbatim):
  - Device ID: ID of the KyttarDevice block
  - Gain: passband (DC) gain
  - Sample Rate: sample rate in Hz
  - Cutoff Freq: passband-edge cutoff in Hz
  - Transition Width: transition-band width in Hz (sets the tap count)
  - Window: design window (Hamming default, Hann, Blackman, Rectangular,
    Blackman-Harris, Kaiser)
  - Beta: Kaiser window beta (used only when Window = Kaiser)

templates:
  imports: from gnuradio import kyttar
  make: kyttar.low_pass_filter(device_id=${device_id}, gain=${gain}, samp_rate=${samp_rate},
    cutoff_freq=${cutoff_freq}, transition_width=${transition_width}, window=${window}, beta=${beta})
  callbacks:
    - set_cutoff_freq(${cutoff_freq})
    - set_transition_width(${transition_width})

parameters:
  - id: device_id
    label: Device ID
    dtype: string
    default: '"kyttar_0"'
  - id: gain
    label: Gain
    dtype: real
    default: '1.0'
  - id: samp_rate
    label: Sample Rate
    dtype: real
    default: samp_rate
  - id: cutoff_freq
    label: Cutoff Freq
    dtype: real
    default: '4000'
  - id: transition_width
    label: Transition Width
    dtype: real
    default: '2000'
  - id: window
    label: Window
    dtype: string
    default: '"hamming"'
    options: ['"hamming"', '"hann"', '"blackman"', '"rectangular"', '"blackman_harris"', '"kaiser"']
    option_labels: [Hamming, Hann, Blackman, Rectangular, Blackman-harris, Kaiser]
  - id: beta
    label: Beta
    dtype: real
    default: '6.76'

inputs:
  - label: in
    dtype: float

outputs:
  - label: out
    dtype: float

file_format: 1
