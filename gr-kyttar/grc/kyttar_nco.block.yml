id: kyttar_nco
label: Signal Source
category: '[Kyttar]'
flags: [ python ]

documentation: |-
  Kyttar Signal Source — drop-in for GNU Radio's analog.sig_source_c (complex cosine).

  A numerically-controlled oscillator emitting the complex exponential
  amplitude*exp(j*theta_n) -- I = amplitude*cos(theta_n), Q = amplitude*sin(theta_n),
  theta_n = 2*pi*frequency/sample_rate*n. Each input sample is a trigger (its value
  is ignored); one complex output is produced per trigger.

  On chip the sine is reconstructed from a 33-entry quarter-wave table with linear
  interpolation (~11 LSB worst case vs the ideal tone; ~1 LSB on grid-aligned
  frequencies). The 16-bit phase word resolves frequency to sample_rate/65536 Hz.

  This block runs on the Kyttar chip. Place it between a KyttarSource and KyttarSink
  block, and ensure the device_id matches your KyttarDevice.

  Parameters (mirroring GNU Radio's Signal Source verbatim):
  - Device ID: ID of the KyttarDevice block
  - Sample Rate: sample rate in Hz
  - Frequency: tone frequency in Hz (NOT an internal freq_word)
  - Amplitude: output amplitude (0..1)
  - Waveform: "cos" (the complex cosine; GR_COS_WAVE)

templates:
  imports: from gnuradio import kyttar
  make: kyttar.nco(device_id=${device_id}, sample_rate=${sample_rate}, frequency=${frequency},
    amplitude=${amplitude}, waveform=${waveform})
  callbacks:
    - set_frequency(${frequency})

parameters:
  - id: device_id
    label: Device ID
    dtype: string
    default: '"kyttar_0"'
  - id: sample_rate
    label: Sample Rate
    dtype: real
    default: samp_rate
  - id: frequency
    label: Frequency
    dtype: real
    default: '2000'
  - id: amplitude
    label: Amplitude
    dtype: real
    default: '0.9'
  - id: waveform
    label: Waveform
    dtype: string
    default: '"cos"'

inputs:
  - label: trigger
    dtype: complex

outputs:
  - label: out
    dtype: complex

file_format: 1
